<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnimeSubHaven | Multi-Language Subtitles</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-black text-white font-['Inter']">

<!-- Mobile Menu Overlay -->
<div id="mobileMenu" class="mobile-nav md:hidden uppercase font-black tracking-widest text-sm">
    <div class="absolute top-10 right-10 text-3xl" onclick="toggleMenu()"><i class="fas fa-times"></i></div>
    <a href="javascript:void(0)" onclick="showPage('leaderboard'); toggleMenu()" class="hover:text-red-500">Leaderboard</a>
    <a href="javascript:void(0)" onclick="showPage('latest'); toggleMenu()" class="hover:text-red-500">Latest</a>
    <a href="javascript:void(0)" onclick="showPage('requests'); toggleMenu()" class="hover:text-red-500">Requests</a>
</div>

<!-- Telegram Floating Button -->
<a href="https://t.me/animesubhaven" target="_blank" class="tg-btn" id="tgBtn">
    <span>Join Telegram Channel</span>
    <i class="fab fa-telegram-plane text-xl"></i>
</a>

<div id="main-ui" class="hero-bg min-h-screen">
    <!-- Navigation -->
    <nav class="px-6 md:px-8 py-6 flex justify-between items-center border-b border-white/10 sticky top-0 z-50 bg-black/20 backdrop-blur-md">
        <div class="logo rgb-text cursor-pointer font-black tracking-widest text-xl md:text-2xl" onclick="showPage('home')">
            ANIME SUB HAVEN
        </div>
        
        <!-- Desktop Menu -->
        <div class="hidden md:flex gap-8 text-[11px] font-bold uppercase tracking-widest">
            <a href="javascript:void(0)" onclick="showPage('leaderboard')" class="hover:text-red-500 transition">Leaderboard</a>
            <a href="javascript:void(0)" onclick="showPage('latest')" class="hover:text-red-500 transition">Latest</a>
            <a href="javascript:void(0)" onclick="showPage('requests')" class="hover:text-red-500 transition">Requests</a>
        </div>

        <!-- Mobile Menu Icon -->
        <div class="md:hidden text-2xl cursor-pointer" onclick="toggleMenu()">
            <i class="fas fa-bars"></i>
        </div>
    </nav>

    <main class="p-6 md:p-10">
        <!-- HOME PAGE -->
        <section id="home-page" class="flex flex-col justify-center h-[60vh]">
            <h1 class="text-4xl md:text-6xl font-black mb-4 leading-tight uppercase">
                Find Subtitles for <br><span id="typewriter" class="text-red-600" style="text-shadow: 0 0 15px rgba(255, 0, 0, 0.7);"></span>
            </h1>
            <div class="relative mt-8 max-w-2xl">
                <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-gray-500">
                    <i class="fas fa-search"></i>
                </span>
                <input type="text" id="searchInput" onkeypress="handleSearch(event)" placeholder="Search anime..." 
                class="w-full bg-black/40 backdrop-blur-md p-5 pl-12 rounded-2xl text-white font-bold border border-white/10 focus:ring-2 focus:ring-red-600/50 outline-none transition-all shadow-2xl">
            </div>
        </section>

        <!-- LATEST / SEARCH PAGE -->
        <section id="latest-page" class="hidden">
            <h2 class="text-3xl font-black uppercase mb-10">Subtitles Library</h2>
            <div id="latest-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
            <div id="not-found" class="hidden text-center py-10"></div>
        </section>

        <!-- ADMIN PANEL & OTHER SECTIONS (පරණ කෝඩ් එකමයි) -->
        <section id="leaderboard-page" class="hidden">
            <h2 class="text-3xl font-black uppercase mb-10">Admin Panel</h2>
            <!-- ඔයාගේ Admin Panel කෝඩ් එක මෙතන තියෙයි -->
        </section>

        <!-- (අනිත් ඔක්කොම Sections මෙතන තියෙන්න ඕනේ...) -->

    </main>
</div>

<script src="data.js"></script>
<script src="script.js"></script>
<script>
    // Mobile Menu Toggle
    function toggleMenu() {
        document.getElementById('mobileMenu').classList.toggle('active');
    }

    // Telegram Auto-Compact
    window.onload = function() {
        setTimeout(() => {
            document.getElementById('tgBtn').classList.add('compact');
        }, 5000);
    };

    // පරණ පේජ් මාරු කරන Function එක (script.js එකේ නැත්නම් මේක පාවිච්චි කරන්න)
    function showPage(pageId) {
        const sections = ['home-page', 'latest-page', 'leaderboard-page', 'requests-page', 'status-page', 'login-page'];
        sections.forEach(s => {
            const el = document.getElementById(s);
            if(el) el.classList.add('hidden');
        });
        const target = document.getElementById(pageId + '-page');
        if(target) target.classList.remove('hidden');
    }
</script>
</body>
</html>
