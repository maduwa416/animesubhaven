<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnimeSubHaven | Multi-Language Subtitles</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-black text-white font-['Inter']">

<!-- Telegram Floating Button -->
<a href="https://t.me/animesubhaven" target="_blank" class="tg-btn" id="tg-floating-btn">
    <span class="tg-text">Join Telegram Channel</span>
    <i class="fab fa-telegram-plane"></i>
</a>

<div id="main-ui" class="hero-bg min-h-screen">
    <!-- Navigation -->
    <nav class="nav-glass px-4 md:px-8 py-6 flex justify-between items-center border-b border-white/10 sticky top-0 z-50">
        <div class="flex items-center justify-between w-full md:justify-start md:gap-10">
            <!-- Logo -->
            <div class="logo cursor-pointer text-red-600 font-black tracking-widest text-lg md:text-2xl" onclick="showPage('home')" style="text-shadow: 0 0 10px rgba(255, 0, 0, 0.5);">
                ANIME SUB HAVEN
            </div>
            
            <!-- Menu Items -->
            <div class="flex gap-4 md:gap-8 text-[9px] md:text-[11px] font-bold uppercase tracking-widest">
                <a href="javascript:void(0)" onclick="showPage('leaderboard')" class="hover:text-red-500 transition">Leaderboard</a>
                <a href="javascript:void(0)" onclick="showPage('latest')" class="hover:text-red-500 transition">Latest</a>
                <a href="javascript:void(0)" onclick="showPage('requests')" class="hover:text-red-500 transition hidden md:block">Requests</a>
            </div>
        </div>
    </nav>

    <main class="p-6 md:p-10">
        <!-- HOME PAGE -->
        <section id="home-page" class="flex flex-col justify-center h-[60vh]">
            <h1 class="text-3xl md:text-6xl font-black mb-4 leading-tight uppercase">
                Find Subtitles for <br><span id="typewriter" class="text-red-600" style="text-shadow: 0 0 15px rgba(255, 0, 0, 0.7);"></span>
            </h1>
            <div class="relative mt-8 max-w-2xl">
                <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-gray-500">
                    <i class="fas fa-search"></i>
                </span>
                <input type="text" id="searchInput" onkeypress="handleSearch(event)" placeholder="Search anime..." 
                class="w-full bg-black/40 backdrop-blur-md p-5 pl-12 rounded-2xl text-white font-bold border border-white/10 focus:ring-2 focus:ring-red-600/50 outline-none transition-all shadow-2xl">
            </div>
        </section>

        <!-- LATEST / SEARCH PAGE -->
        <section id="latest-page" class="hidden">
            <h2 class="section-title text-2xl md:text-3xl font-black uppercase mb-10">Subtitles Library</h2>
            <div id="latest-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
            <div id="not-found" class="hidden text-center py-10 flex flex-col items-center justify-center w-full"></div>
        </section>

        <!-- ADMIN LOGIN -->
        <section id="login-page" class="hidden max-w-md mx-auto text-center mt-20">
            <h2 class="text-xl mb-6 font-black uppercase tracking-widest">Admin Access</h2>
            <input type="password" id="adminPass" onkeypress="handleAdminLogin(event)" class="w-full bg-white/10 p-4 rounded-xl border border-white/10 text-center outline-none mb-4" placeholder="••••••••">
            <button onclick="checkAdmin()" class="w-full bg-red-700 text-white py-4 rounded-xl font-black hover:bg-red-600 transition shadow-lg">LOGIN</button>
        </section>

        <!-- ADMIN PANEL -->
        <section id="leaderboard-page" class="hidden">
            <div class="flex justify-between items-center mb-10">
                <h2 class="section-title text-xl md:text-3xl font-black uppercase tracking-tighter">Admin Panel</h2>
                <button onclick="showStatusPage()" class="bg-white/10 hover:bg-red-600 border border-white/20 px-3 py-2 rounded-lg text-[9px] font-bold tracking-widest transition-all">
                    <i class="fas fa-chart-line mr-2"></i> STATUS
                </button>
            </div>

            <div class="bg-black/60 backdrop-blur-md p-6 md:p-8 rounded-3xl border border-white/10 shadow-2xl">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4 md:gap-6 mb-8">
                    <input type="text" id="upName" placeholder="Anime Name" class="bg-white/5 p-4 rounded-xl border border-white/10 w-full outline-none focus:border-red-600">
                    <input type="text" id="upSeason" placeholder="Season" class="bg-white/5 p-4 rounded-xl border border-white/10 w-full outline-none focus:border-red-600">
                    <input type="date" id="upDate" class="bg-white/5 p-4 rounded-xl border border-white/10 w-full outline-none focus:border-red-600">
                </div>

                <div class="flex gap-4 mb-6 border-b border-white/10 pb-4 font-black text-xs uppercase tracking-widest">
                    <button id="tab-si" onclick="switchTab('si')" class="text-red-500 border-b-2 border-red-500 pb-2">Sinhala Subs</button>
                    <button id="tab-en" onclick="switchTab('en')" class="text-gray-500 pb-2">English Subs</button>
                </div>

                <div id="si-inputs" class="grid grid-cols-2 md:grid-cols-5 gap-3 h-64 overflow-y-auto pr-4 custom-scrollbar"></div>
                <div id="en-inputs" class="hidden grid grid-cols-2 md:grid-cols-5 gap-3 h-64 overflow-y-auto pr-4 custom-scrollbar"></div>

                <textarea id="upDesc" placeholder="Description..." class="w-full bg-white/5 p-4 rounded-xl border border-white/10 mt-8 h-24 outline-none focus:border-red-600"></textarea>
                <button onclick="generateAnimeCode()" class="w-full bg-red-700 text-white py-5 mt-8 rounded-xl font-black uppercase tracking-widest hover:bg-red-600 transition shadow-red-900/20 shadow-xl">Generate Data Code</button>
                
                <div id="codeDisplay" class="hidden mt-8">
                    <textarea id="finalCode" readonly class="w-full h-48 bg-black text-green-500 p-4 rounded-xl font-mono text-[10px] border border-green-500/30"></textarea>
                    <button onclick="copyToClipboard()" class="text-red-500 text-xs mt-2 font-bold underline">COPY CODE</button>
                </div>
            </div>
        </section>

        <!-- STATUS PAGE -->
        <section id="status-page" class="hidden">
            <div class="flex items-center gap-4 mb-8">
                <button onclick="showPage('leaderboard')" class="text-gray-500 hover:text-white"><i class="fas fa-arrow-left"></i></button>
                <h2 class="text-2xl md:text-3xl font-black uppercase tracking-tighter">Site Statistics</h2>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10 text-center">
                <div class="bg-black/60 border border-white/10 p-8 rounded-3xl shadow-2xl">
                    <i class="fas fa-tv text-red-600 text-3xl mb-4"></i>
                    <h3 class="text-gray-400 text-[10px] font-bold uppercase tracking-widest">Total Anime</h3>
                    <p id="stat-total-anime" class="text-4xl md:text-5xl font-black mt-2 tracking-tighter">0</p>
                </div>
                <div class="bg-black/60 border border-white/10 p-8 rounded-3xl shadow-2xl">
                    <i class="fas fa-closed-captioning text-red-600 text-3xl mb-4"></i>
                    <h3 class="text-gray-400 text-[10px] font-bold uppercase tracking-widest">Total Subtitles</h3>
                    <p id="stat-total-subs" class="text-4xl md:text-5xl font-black mt-2 tracking-tighter">0</p>
                </div>
                <div class="bg-black/60 border border-white/10 p-8 rounded-3xl shadow-2xl">
                    <i class="fas fa-users text-red-600 text-3xl mb-4"></i>
                    <h3 class="text-gray-400 text-[10px] font-bold uppercase tracking-widest">Site Traffic</h3>
                    <p class="text-4xl md:text-5xl font-black mt-2 tracking-tighter">LIVE</p>
                </div>
            </div>

            <div class="bg-black/60 border border-white/10 p-6 md:p-8 rounded-3xl shadow-2xl">
                <h3 class="text-[11px] font-black uppercase mb-6 border-b border-white/10 pb-4 tracking-widest">Recent Upload History</h3>
                <div id="status-history" class="space-y-4"></div>
            </div>
        </section>

        <!-- REQUESTS PAGE -->
        <section id="requests-page" class="hidden max-w-xl mx-auto bg-black/60 p-10 rounded-3xl border border-white/10 text-center shadow-2xl">
            <h2 class="text-2xl font-black mb-6 uppercase tracking-widest">Make a Request</h2>
            <input type="text" id="reqName" placeholder="Anime Name" class="w-full bg-white/5 p-4 rounded-xl border border-white/10 outline-none mb-4 focus:border-red-600">
            <button onclick="alert('Request Sent!')" class="w-full bg-red-700 text-white py-4 rounded-xl font-black uppercase hover:bg-red-600 transition shadow-xl">Send Request</button>
        </section>
    </main>
</div>

<script src="data.js"></script>
<script src="script.js"></script>
</body>
</html>
