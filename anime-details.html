<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Details | AnimeSubHaven</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #000; color: white; }
        .nav-glass { background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(15px); }
        .info-card { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body>

    <!-- Navigation -->
    <nav class="nav-glass px-8 py-6 flex justify-between items-center border-b border-white/10 sticky top-0 z-50">
        <div class="text-2xl font-black tracking-[0.2em] text-yellow-500 cursor-pointer" onclick="window.location.href='index.html'">
            ANIME SUB HAVEN
        </div>
        <div class="flex gap-8 text-[13px] font-bold uppercase tracking-widest">
            <a href="index.html" class="hover:text-yellow-500">Home</a>
        </div>
    </nav>

    <main class="p-10 max-w-5xl mx-auto">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-10">
            
            <!-- Left Side: Basic Info -->
            <div class="md:col-span-1">
                <div class="info-card p-6 rounded-2xl">
                    <h2 id="anime-name" class="text-3xl font-black text-yellow-500 mb-4 uppercase"></h2>
                    <div class="space-y-3 text-sm">
                        <p><span class="text-gray-500">YEAR:</span> <span id="anime-year"></span></p>
                        <p><span class="text-gray-500">SEASON:</span> <span id="anime-season"></span></p>
                        <p><span class="text-gray-500">IMDb:</span> <span id="anime-imdb" class="text-yellow-500 font-bold"></span></p>
                        <p><span class="text-gray-500">GENRE:</span> <span id="anime-genre"></span></p>
                    </div>
                </div>
            </div>

            <!-- Right Side: Description & Download -->
            <div class="md:col-span-2">
                <h3 class="text-xl font-bold mb-4 uppercase tracking-widest border-b border-yellow-500 w-fit pb-1">Description</h3>
                <p id="anime-desc" class="text-gray-400 leading-relaxed mb-10"></p>

                <h3 class="text-xl font-bold mb-6 uppercase tracking-widest border-b border-yellow-500 w-fit pb-1">Download Subtitles</h3>
                <div class="info-card rounded-xl overflow-hidden">
                    <table class="w-full text-left">
                        <thead class="bg-white/10 text-[10px] font-bold uppercase text-gray-500">
                            <tr>
                                <th class="p-4">File Name</th>
                                <th class="p-4 text-center">Action</th>
                            </tr>
                        </thead>
                        <tbody id="download-row">
                            <!-- Data will load here -->
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </main>

    <!-- Data links -->
    <script src="data.js"></script>
    <script>
        // URL එකෙන් ID එක ගන්නවා (උදා: ?id=hipe)
        const urlParams = new URLSearchParams(window.location.search);
        const animeId = urlParams.get('id');

        // data.js එකේ තියෙන ලිස්ට් එකෙන් අදාළ ඇනිමේ එක හොයනවා
        const anime = window.animeData.find(item => item.id === animeId);

        if (anime) {
            document.getElementById('anime-name').innerText = anime.name;
            document.getElementById('anime-year').innerText = anime.year || 'N/A';
            document.getElementById('anime-season').innerText = anime.season || 'N/A';
            document.getElementById('anime-imdb').innerText = anime.imdb || 'N/A';
            document.getElementById('anime-genre').innerText = anime.genre || 'N/A';
            document.getElementById('anime-desc').innerText = anime.description || 'No description available.';

            // Download Row එක හදනවා
            const row = document.getElementById('download-row');
            row.innerHTML = `
                <tr class="border-t border-white/5">
                    <td class="p-4 text-sm font-medium text-gray-300 uppercase">${anime.name} - Full Pack / Ep</td>
                    <td class="p-4 text-center">
                        <a href="${anime.subLink}" target="_blank" class="bg-yellow-500 text-black px-6 py-2 rounded-lg font-black text-xs hover:bg-yellow-400 transition inline-block">DOWNLOAD</a>
                    </td>
                </tr>
            `;
        } else {
            document.body.innerHTML = `<div class="text-center mt-20"><h1 class="text-2xl font-bold">Anime Not Found!</h1><a href="index.html" class="text-yellow-500 underline">Go Back</a></div>`;
        }
    </script>
</body>
</html>
